<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S@N Content Hub</title>

<script src="content.js"></script>

<style>
:root {
    --bg: #000;
    --fg: #fff;
    --border: rgba(255,255,255,0.25);
    --trans: 0.35s ease;
    --snappy: cubic-bezier(0.2, 0.8, 0.2, 1);
    --topbar-h: 64px;
}
body.light {
    --bg: #fff;
    --fg: #000;
    --border: rgba(0,0,0,0.2);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition: background var(--trans), color var(--trans);
    overflow-x: hidden;
    min-height: 100vh;
}
.cat-item {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color var(--trans);
}
.cat-title {
    padding: 12px 14px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
}
.cat-title::after {
    content: '›';
    font-size: 18px;
    transition: transform 0.2s var(--snappy);
    opacity: 0.4;
}
.cat-item.expanded .cat-title::after { transform: rotate(90deg); }
.cat-content {
    font-size: 13px;
    line-height: 1.55;
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    display: none;
}
.cat-item.expanded .cat-content { display: block; }
.menu-link-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    cursor: pointer;
    text-decoration: none;
    color: var(--fg);
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
}
.menu-link-item:hover { background: rgba(128,128,128,0.1); }
.menu-link-item::after {
    content: '↗';
    margin-left: auto;
    opacity: 0.35;
    font-size: 14px;
}
#app {
    padding: calc(var(--topbar-h) + 18px) 16px 18px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
}
@media(max-width: 600px) {
    #app { grid-template-columns: 1fr; }
    .box.full { grid-column: span 1 !important; }
}
.box {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    transition: border-color var(--trans);
}
.box.full { grid-column: span 2; }
.boxTitle {
    font-weight: 800;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 1.5px;
    opacity: 0.5;
    margin-bottom: 12px;
}
.video-box {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 16 / 9;
    transition: border-color var(--trans);
}
.video-box iframe {
    width: 100%;
    height: 100%;
    display: block;
    border: none;
}
mark { background: var(--fg); color: var(--bg); }
blockquote { border-left: 2px solid var(--fg); padding-left: 10px; font-style: italic; }
pre {
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 8px 12px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px;
    overflow-x: auto;
}
a { color: inherit; }
#footer {
    padding: 28px 20px 36px;
    font-size: 11px;
    line-height: 1.6;
    color: #888;
    text-align: center;
    border-top: 1px solid var(--border);
    transition: border-color var(--trans);
}
</style>
</head>
<body>

<div id="topbar">
    <div id="logoText" oncontextmenu="return false;" ondragstart="return false;">
        <img id="logoTextImg" alt="VOODAC" draggable="false">
    </div>
    <div id="menuBtn" role="button" aria-label="Open menu" tabindex="0"
         oncontextmenu="return false;"
         onclick="toggleMenu()"
         onkeydown="if(event.key==='Enter'||event.key===' ')toggleMenu()">
        <img id="menuBtnImg" alt="" draggable="false">
    </div>
</div>

<div id="menuOverlay" onclick="handleOverlayClick(event)">
    <div id="menu" role="dialog" aria-modal="true" aria-label="Navigation menu">
        <span id="menuClose" role="button" tabindex="0" aria-label="Close menu"
              onclick="toggleMenu()"
              onkeydown="if(event.key==='Enter')toggleMenu()">✕</span>
        <div id="menuScroll">
            <div id="catRoot"></div>
            <div id="menuLinks"></div>
        </div>
    </div>
</div>

<div id="app"></div>
<div id="footer"></div>

<script>
(function() {
    const mq = window.matchMedia('(prefers-color-scheme: light)');
    function applyTheme(light) {
        document.body.classList.toggle('light', light);
        updateLogos(light);
    }
    function updateLogos(light) {
        const img = document.getElementById('logoTextImg');
        const btn = document.getElementById('menuBtnImg');
        if (!img || !btn || typeof VOODAC_IMAGES === 'undefined') return;
        img.src = light ? VOODAC_IMAGES.textLight : VOODAC_IMAGES.textDark;
        btn.src = light ? VOODAC_IMAGES.logoLight : VOODAC_IMAGES.logoDark;
    }
    applyTheme(mq.matches);
    mq.addEventListener('change', e => applyTheme(e.matches));
    window.addEventListener('DOMContentLoaded', () => applyTheme(mq.matches));
})();

let menuOpen = false;
function toggleMenu() {
    menuOpen = !menuOpen;
    document.getElementById('menu').classList.toggle('open', menuOpen);
    document.getElementById('menuOverlay').classList.toggle('open', menuOpen);
    document.body.style.overflow = menuOpen ? 'hidden' : '';
}
function handleOverlayClick(e) {
    if (!document.getElementById('menu').contains(e.target)) {
        if (menuOpen) toggleMenu();
    }
}
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && menuOpen) toggleMenu();
});

function parseTags(text) {
    return text
        .replace(/<b>([\s\S]*?)<\/b>/g, '<strong>$1</strong>')
        .replace(/<i>([\s\S]*?)<\/i>/g, '<em>$1</em>')
        .replace(/<color=(.*?)>([\s\S]*?)<\/color>/g, '<span style="color:$1">$2</span>')
        .replace(/<size=(\d+)>([\s\S]*?)<\/size>/g, '<span style="font-size:$1px">$2</span>')
        .replace(/<center>([\s\S]*?)<\/center>/g, '<div style="text-align:center">$1</div>')
        .replace(/<mono>([\s\S]*?)<\/mono>/g, '<pre>$1</pre>')
        .replace(/<quote>([\s\S]*?)<\/quote>/g, '<blockquote>$1</blockquote>')
        .replace(/<link=(.*?)>([\s\S]*?)<\/link>/g, '<a href="$1" style="color:inherit" target="_blank" rel="noopener">$2</a>')
        .replace(/<hr>/g, '<hr style="border:none;border-top:1px solid var(--border);margin:10px 0">')
        .replace(/<br\s*\/?>/gi, '<br>');
}

function init() {
    if (typeof VOODAC_CONTENT === 'undefined') return;
    const raw = VOODAC_CONTENT;
    const app = document.getElementById('app');
    const catRoot = document.getElementById('catRoot');
    const menuLinks = document.getElementById('menuLinks');
    const footer = document.getElementById('footer');

    rebuildInOrder(raw, app);

    const catRegex = /\[cat=(.*?)\]([\s\S]*?)\[\/cat\]/g;
    let match, hasCats = false;
    while ((match = catRegex.exec(raw)) !== null) {
        if (!hasCats) {
            const lbl = document.createElement('div');
            lbl.className = 'menu-section-label';
            lbl.textContent = 'Info';
            catRoot.appendChild(lbl);
            hasCats = true;
        }
        const div = document.createElement('div');
        div.className = 'cat-item';
        div.innerHTML = `<div class="cat-title">${match[1]}</div><div class="cat-content">${parseTags(match[2])}</div>`;
        div.querySelector('.cat-title').addEventListener('click', () => div.classList.toggle('expanded'));
        catRoot.appendChild(div);
    }

    const mlRegex = /\[menulink=(.*?)\]([\s\S]*?)\[\/menulink\]/g;
    let hasLinks = false;
    while ((match = mlRegex.exec(raw)) !== null) {
        if (!hasLinks) {
            const lbl = document.createElement('div');
            lbl.className = 'menu-section-label';
            lbl.textContent = 'Links';
            menuLinks.appendChild(lbl);
            hasLinks = true;
        }
        const a = document.createElement('a');
        a.className = 'menu-link-item';
        a.textContent = match[1];
        a.href = match[2].trim();
        a.target = '_blank';
        a.rel = 'noopener';
        menuLinks.appendChild(a);
    }

    const footerMatch = raw.match(/\[footer\]([\s\S]*?)\[\/footer\]/);
    if (footerMatch) footer.innerHTML = parseTags(footerMatch[1].trim());
}

function rebuildInOrder(raw, app) {
    while (app.firstChild) app.removeChild(app.firstChild);
    const items = [];
    const boxRegex = /\[box(1|2)=(.*?)\]([\s\S]*?)\[\/box\1\]/g;
    let m;
    while ((m = boxRegex.exec(raw)) !== null) {
        items.push({ pos: m.index, type: 'box', cols: m[1], title: m[2], content: m[3] });
    }
    const videoRegex = /\[video(1|2)=(.*?)\]/g;
    while ((m = videoRegex.exec(raw)) !== null) {
        items.push({ pos: m.index, type: 'video', cols: m[1], url: m[2].trim() });
    }
    items.sort((a, b) => a.pos - b.pos);
    for (const item of items) {
        if (item.type === 'box') {
            let content = item.content;
            let bgColor = null;
            const bgMatch = content.match(/<bg=(.*?)>([\s\S]*?)<\/bg>/);
            if (bgMatch) { bgColor = bgMatch[1]; content = bgMatch[2]; }
            const div = document.createElement('div');
            div.className = 'box' + (item.cols === '2' ? ' full' : '');
            if (bgColor) div.style.background = bgColor;
            div.innerHTML = `<div class="boxTitle">${item.title}</div><div>${parseTags(content)}</div>`;
            app.appendChild(div);
        } else if (item.type === 'video') {
            const wrap = document.createElement('div');
            wrap.className = 'video-box' + (item.cols === '2' ? ' full' : '');
            const iframe = document.createElement('iframe');
            iframe.src = item.url;
            iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
            iframe.allowFullscreen = true;
            iframe.loading = 'lazy';
            wrap.appendChild(iframe);
            app.appendChild(wrap);
        }
    }
}

init();
</script>
</body>
</html>
